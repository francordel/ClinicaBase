<body>

    <header class="header">
        <div class="container header__container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.svg" alt="Clínica Base" style="height: 40px;">
            </a>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="index.html#servicios" class="nav__link">Servicios</a></li>
                    <li class="nav__item"><a href="index.html#equipo" class="nav__link">Equipo</a></li>
                    <li class="nav__item"><a href="index.html#testimonios" class="nav__link">Testimonios</a></li>

                <span class="hamburger"></span>

        </div>

        <div class="container">
            <div class="section__header" style="text-align: center; margin-bottom: 3rem;">
                <span class="badge">NUESTRAS INSTALACIONES Y EQUIPO</span>
                <h1 class="section__title">Galería de Imágenes</h1>
            </div>

            <!-- Equipo / Clinica (Los Dos) -->
            <section class="gallery-section" id="clinica">
                <h2 class="gallery-category">Clínica y Equipo</h2>
                <div class="gallery__grid">
                    <div class="gallery-item">
                        <img src="assets/images/Fotos_losDos/PHOTO-2026-02-16-11-26-16.jpg" alt="Clínica y Equipo 1"
                            loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/Fotos_losDos/PHOTO-2026-02-16-11-26-18.jpg" alt="Clínica y Equipo 2"
                            loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/Fotos_losDos/PHOTO-2026-02-16-11-26-23.jpg" alt="Clínica y Equipo 3"
                            loading="lazy">
                    </div>
                </div>
            </section>

            <!-- Fran -->
            <section class="gallery-section" id="fran">
                <h2 class="gallery-category">Fran</h2>
                <div class="gallery__grid">
                    <div class="gallery-item">
                        <img src="assets/images/fotos_fran/PHOTO-2026-02-16-11-26-14.jpg" alt="Fran - Fisioterapia"
                            loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/fotos_fran/PHOTO-2026-02-16-11-26-15.jpg" alt="Fran - Fisioterapia"
                            loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/fotos_fran/PHOTO-2026-02-16-11-26-20.jpg" alt="Fran - Fisioterapia"
                            loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/fotos_fran/PHOTO-2026-02-16-11-26-24 2.jpg" alt="Fran - Fisioterapia"
                            loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/fotos_fran/PHOTO-2026-02-16-11-26-24.jpg" alt="Fran - Fisioterapia"
                            loading="lazy">
                    </div>
                </div>
            </section>

            <!-- Guille -->
            <section class="gallery-section" id="guille">
                <h2 class="gallery-category">Guille</h2>
                <div class="gallery__grid">
                    <div class="gallery-item">
                        <img src="assets/images/fotos_guille/PHOTO-2026-02-16-08-58-15 2.jpg"
                            alt="Guille - Fisioterapia" loading="lazy">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/images/fotos_guille/PHOTO-2026-02-16-08-58-15.jpg" alt="Guille - Fisioterapia"
                            loading="lazy">
                    </div>
                </div>
            </section>

        </div>
